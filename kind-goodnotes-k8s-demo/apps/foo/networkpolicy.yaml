apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: foo-ingress
  namespace: apps
spec:
  podSelector:
    matchLabels:
      app: http-echo
      variant: foo
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: gateway
      ports:
        - port: 5678
          protocol: TCP
