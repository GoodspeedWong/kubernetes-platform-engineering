apiVersion: k6.io/v1alpha1
kind: TestRun
metadata:
  name: iris-loadtest
  namespace: apps
spec:
  parallelism: 3
  script:
    configMap:
      name: iris-k6-script
      file: test.js
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: iris-k6-script
  namespace: apps
data:
  test.js: |
    import http from 'k6/http';
    import { sleep, check } from 'k6';

    export let options = {
      vus: 50,
      duration: '360s',
    };

    export default function () {
      const url = 'http://iris.localhost:8080/predict';
      const payload = JSON.stringify({
        features: [5.1, 3.5, 1.4, 0.2],
      });

      const params = {
        headers: {
          'Content-Type': 'application/json',
          'Host': 'iris.localhost'   // 必须。Ingress 的路由关键！
        },
      };

      const res = http.post(url, payload, params);

      check(res, {
        "status is 200": (r) => r.status === 200,
      });

      sleep(0.2);
    }