            },
            "textMode": "value_and_name"
          },
          "targets": [
            {
              "format": "table",
              "rawQuery": true,
              "rawSql": "with latest as (\n  select payload\n  from summary_snapshots\n  where summary_type = 'monitoring_storage_audit' and snapshot_key = 'latest'\n), node_rows as (\n  select regexp_replace(coalesce(node_df->>'used_percent', '0%'), '%', '', 'g')::numeric as used_percent\n  from jsonb_to_recordset((select payload->'top_by_node' from latest))\n    as x(node text, requested_human text, measured_human text, consumer_count int, measured_bytes bigint, node_df jsonb)\n)\nselect max(used_percent) as value\nfrom node_rows;",
              "refId": "A"
