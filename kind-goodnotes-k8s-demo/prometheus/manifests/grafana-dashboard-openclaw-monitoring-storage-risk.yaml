            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "value_and_name"
          },
          "targets": [
            {
              "format": "table",
              "rawQuery": true,
              "rawSql": "with latest as (\n  select payload\n  from summary_snapshots\n  where summary_type = 'monitoring_storage_audit' and snapshot_key = 'latest'\n), ingesters as (\n  select measured_bytes\n  from jsonb_to_recordset((select payload->'volumes' from latest))\n    as x(claim text, workload text, node text, requested_human text, measured_human text, requested_bytes bigint, measured_bytes bigint, risk text, top_subpaths jsonb)\n  where workload like 'StatefulSet/mimir-ingester-zone-%'\n)\nselect round(max(measured_bytes)::numeric / 1073741824, 1) as value\nfrom ingesters;",
              "refId": "A"
            }
          ],
          "title": "Largest Mimir Zone GiB",
          "type": "stat"
        },
        {
          "datasource": "openclaw-postgres",
          "gridPos": {
            "h": 9,
            "w": 12,
            "x": 0,
            "y": 14
          },
          "id": 3,
          "options": {
            "cellHeight": "sm",
            "footer": {
              "show": false
            },
            "showHeader": true
          },
          "targets": [
            {
              "format": "table",
              "rawQuery": true,
              "rawSql": "with latest as (\n  select payload\n  from summary_snapshots\n  where summary_type = 'monitoring_storage_audit' and snapshot_key = 'latest'\n)\nselect row_number() over (\n         order by regexp_replace(coalesce(node_df->>'used_percent', '0%'), '%', '', 'g')::int desc,\n                  measured_bytes desc nulls last\n       ) as \"Rank\",\n       node as \"Node\",\n       node_df->>'used_percent' as \"Root Used %\",\n       measured_human as \"Measured\",\n       requested_human as \"Requested\",\n       consumer_count as \"Consumers\"\nfrom jsonb_to_recordset((select payload->'top_by_node' from latest))\n  as x(node text, requested_human text, measured_human text, consumer_count int, measured_bytes bigint, node_df jsonb)\norder by regexp_replace(coalesce(node_df->>'used_percent', '0%'), '%', '', 'g')::int desc,\n         measured_bytes desc nulls last;",
              "refId": "A"
            }
          ],
          "title": "Node Disk Pressure",
          "type": "table"
        },
        {
          "datasource": "openclaw-postgres",
          "gridPos": {
            "h": 9,
            "w": 12,
            "x": 12,
            "y": 14
          },
          "id": 4,
          "options": {
            "cellHeight": "sm",
            "footer": {
              "show": false
            },
            "showHeader": true
          },
          "targets": [
            {
              "format": "table",
              "rawQuery": true,
              "rawSql": "with latest as (\n  select payload\n  from summary_snapshots\n  where summary_type = 'monitoring_storage_audit' and snapshot_key = 'latest'\n)\nselect row_number() over (order by node, monitoring_workload) as \"Rank\",\n       node as \"Node\",\n       apps_claim as \"Apps PVC\",\n       coalesce((select string_agg(value, ', ') from jsonb_array_elements_text(apps_workloads) value), '-') as \"Apps Workloads\",\n       monitoring_workload as \"Monitoring Workload\",\n       monitoring_claim as \"Monitoring PVC\",\n       monitoring_measured_human as \"Monitoring Measured\"\nfrom jsonb_to_recordset((select payload->'blast_radius' from latest))\n  as x(node text, apps_claim text, apps_workloads jsonb, monitoring_workload text, monitoring_claim text, monitoring_measured_human text)\norder by node, monitoring_workload;",
              "refId": "A"
            }
          ],
          "title": "Storage Blast Radius to apps",
          "type": "table"
        },
        {
          "datasource": "openclaw-postgres",
          "gridPos": {
            "h": 10,
            "w": 12,
            "x": 0,
            "y": 23
          },
          "id": 5,
          "options": {
            "cellHeight": "sm",
            "footer": {
              "show": false
            },
            "showHeader": true
          },
          "targets": [
            {
              "format": "table",
              "rawQuery": true,
              "rawSql": "with latest as (\n  select payload\n  from summary_snapshots\n  where summary_type = 'monitoring_storage_audit' and snapshot_key = 'latest'\n)\nselect row_number() over (order by measured_bytes desc nulls last) as \"Rank\",\n       claim as \"PVC\",\n       workload as \"Workload\",\n       node as \"Node\",\n       requested_human as \"Requested\",\n       measured_human as \"Measured\",\n       round(coalesce(measured_bytes, 0)::numeric / nullif(requested_bytes, 0), 2) as \"Actual/Requested\",\n       risk as \"Risk\",\n       coalesce(top_subpaths->0->>'basename', '-') as \"Hottest Path\",\n       coalesce(top_subpaths->0->>'human', '-') as \"Hot Size\"\nfrom jsonb_to_recordset((select payload->'volumes' from latest))\n  as x(claim text, workload text, node text, requested_human text, measured_human text, requested_bytes bigint, measured_bytes bigint, risk text, top_subpaths jsonb)\norder by measured_bytes desc nulls last\nlimit 20;",
              "refId": "A"
            }
          ],
          "title": "PVC Requested vs Actual Usage",
          "type": "table"
        },
        {
          "datasource": "openclaw-postgres",
          "gridPos": {
            "h": 10,
