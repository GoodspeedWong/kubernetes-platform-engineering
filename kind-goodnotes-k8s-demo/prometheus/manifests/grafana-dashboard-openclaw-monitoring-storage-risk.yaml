          "id": 1,
          "options": {
            "content": "### Monitoring Storage Risk Overview\n\nThis dashboard reads the latest `monitoring_storage_audit` snapshot from `summary_snapshots` through the Grafana PostgreSQL datasource `openclaw-postgres`.\n\nFocus order:\n- `Threshold Watch`\n- `Node Disk Pressure`\n- `Blast Radius to apps`\n- `PVC Requested vs Actual`\n- `Mimir TSDB Risk by Zone`\n\nUse together with:\n- runbook: `docs/runbooks/monitoring_storage_incident_zh.md`\n- RCA: `docs/postmortems/2026-03-27-worker3-disk-full-rca.md`\n\nThis is intentionally storage-risk-first, not a generic infrastructure overview.",
            "mode": "markdown"
          },
          "title": "How To Read This",
          "type": "text"
        },
        {
          "datasource": "openclaw-postgres",
          "gridPos": {
            "h": 5,
            "w": 24,
            "x": 0,
            "y": 5
          },
          "id": 2,
          "options": {
            "cellHeight": "sm",
            "footer": {
              "show": false
            },
            "showHeader": true
          },
          "targets": [
            {
              "format": "table",
              "rawQuery": true,
              "rawSql": "with latest as (\n  select payload\n  from summary_snapshots\n  where summary_type = 'monitoring_storage_audit' and snapshot_key = 'latest'\n)\nselect payload->>'generated_date' as \"Generated Date\",\n       payload->'summary'->>'overall_risk' as \"Overall Risk\",\n       (payload->'summary'->>'high_risk_volume_count')::int as \"High Risk Volumes\",\n       (payload->'summary'->>'blast_radius_count')::int as \"Blast Radius Count\",\n       payload->'summary'->>'total_requested_human' as \"Requested\",\n       payload->'summary'->>'total_measured_human' as \"Measured\"\nfrom latest;",
              "refId": "A"
            }
          ],
          "title": "Latest Audit Summary",
          "type": "table"
        },
        {
          "datasource": "openclaw-postgres",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 1
