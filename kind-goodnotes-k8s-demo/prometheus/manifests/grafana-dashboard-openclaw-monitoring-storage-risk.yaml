          "targets": [
            {
              "format": "table",
              "rawQuery": true,
              "rawSql": "with latest as (\n  select payload\n  from summary_snapshots\n  where summary_type = 'monitoring_storage_audit' and snapshot_key = 'latest'\n)\nselect row_number() over (order by measured_bytes desc nulls last) as \"Rank\",\n       replace(workload, 'StatefulSet/mimir-ingester-', '') as \"Zone\",\n       node as \"Node\",\n       requested_human as \"Requested\",\n       measured_human as \"Measured\",\n       risk as \"Risk\",\n       coalesce(top_subpaths->0->>'basename', '-') as \"Hottest Path\",\n       coalesce(top_subpaths->0->>'human', '-') as \"Hot Size\"\nfrom jsonb_to_recordset((select payload->'volumes' from latest))\n  as x(claim text, workload text, node text, requested_human text, measured_human text, requested_bytes bigint, measured_bytes bigint, risk text, top_subpaths jsonb)\nwhere workload like 'StatefulSet/mimir-ingester-zone-%'\norder by measured_bytes desc nulls last;",
              "refId": "A"
            }
          ],
          "title": "Mimir TSDB Risk by Zone",
          "type": "table"
        },
        {
          "datasource": "openclaw-postgres",
          "gridPos": {
            "h": 10,
            "w": 12,
            "x": 0,
            "y": 33
          },
          "id": 7,
          "options": {
            "cellHeight": "sm",
            "footer": {
              "show": false
            },
            "showHeader": true
          },
          "targets": [
            {
              "format": "table",
              "rawQuery": true,
              "rawSql": "with latest as (\n  select payload\n  from summary_snapshots\n  where summary_type = 'monitoring_storage_audit' and snapshot_key = 'latest'\n)\nselect row_number() over (order by measured_bytes desc nulls last) as \"Rank\",\n       workload as \"Workload\",\n       node as \"Node\",\n       requested_human as \"Requested\",\n       measured_human as \"Measured\",\n       round(coalesce(measured_bytes, 0)::numeric / nullif(requested_bytes, 0), 2) as \"Actual/Requested\",\n       risk as \"Risk\"\nfrom jsonb_to_recordset((select payload->'top_by_workload' from latest))\n  as x(workload text, node text, requested_human text, measured_human text, requested_bytes bigint, measured_bytes bigint, risk text)\norder by measured_bytes desc nulls last\nlimit 15;",
              "refId": "A"
            }
          ],
          "title": "Top Local-Path Consumers",
          "type": "table"
        },
        {
          "datasource": "openclaw-postgres",
          "gridPos": {
            "h": 10,
            "w": 12,
            "x": 12,
            "y": 33
          },
          "id": 8,
          "options": {
            "cellHeight": "sm",
            "footer": {
              "show": false
            },
            "showHeader": true
          },
          "targets": [
            {
              "format": "table",
              "rawQuery": true,
              "rawSql": "with latest as (\n  select payload\n  from summary_snapshots\n  where summary_type = 'monitoring_storage_audit' and snapshot_key = 'latest'\n), ranked as (\n  select claim,\n         workload,\n         node,\n         risk,\n         top_subpaths->0->>'path' as hot_path,\n         top_subpaths->0->>'basename' as hot_basename,\n         top_subpaths->0->>'human' as hot_human,\n         (top_subpaths->0->>'bytes')::bigint as hot_bytes\n  from jsonb_to_recordset((select payload->'volumes' from latest))\n    as x(claim text, workload text, node text, risk text, top_subpaths jsonb)\n)\nselect row_number() over (order by hot_bytes desc nulls last) as \"Rank\",\n       claim as \"PVC\",\n       workload as \"Workload\",\n       node as \"Node\",\n       coalesce(hot_basename, '-') as \"Hot Path\",\n       coalesce(hot_human, '-') as \"Hot Size\",\n       coalesce(left(hot_path, 140), '-') as \"Path\",\n       risk as \"Risk\"\nfrom ranked\nwhere hot_bytes is not null\norder by hot_bytes desc nulls last\nlimit 20;",
              "refId": "A"
            }
          ],
          "title": "Hot Subpath Drilldown",
          "type": "table"
        }
