            {
              "format": "table",
              "rawQuery": true,
              "rawSql": "with latest as (\n  select payload\n  from summary_snapshots\n  where summary_type = 'monitoring_storage_audit' and snapshot_key = 'latest'\n)\nselect (payload->'summary'->>'blast_radius_count')::int as value\nfrom latest;",
              "refId": "A"
