apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-openclaw-postgres-overview
  namespace: monitoring
data:
  openclaw-postgres-overview.json: |-
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "links": [],
      "panels": [
        {
          "datasource": "prometheus",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 40
                  },
                  {
                    "color": "red",
                    "value": 80
                  }
                ]
              },
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "value_and_name"
          },
          "targets": [
            {
              "expr": "100 * max(pg_stat_database_numbackends{namespace=\"$namespace\",datname=\"$database\"}) / clamp_min(max(pg_settings_max_connections{namespace=\"$namespace\",service=\"postgres-exporter\"}), 1)",
              "instant": true,
              "refId": "A"
            }
          ],
          "title": "Connections Used %",
          "type": "stat"
        },
        {
          "datasource": "prometheus",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              },
              "unit": "none"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 6,
            "y": 0
          },
          "id": 2,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "value_and_name"
          },
          "targets": [
            {
              "expr": "max(pg_settings_max_connections{namespace=\"$namespace\",service=\"postgres-exporter\"})",
              "instant": true,
              "refId": "A"
            }
          ],
          "title": "Max Connections",
          "type": "stat"
        },
        {
          "datasource": "prometheus",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 95
                  },
                  {
                    "color": "red",
                    "value": 99
                  }
                ]
              },
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 12,
            "y": 0
          },
          "id": 3,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "value_and_name"
          },
          "targets": [
            {
              "expr": "100 * sum(rate(pg_stat_database_blks_hit{namespace=\"$namespace\",datname=\"$database\"}[$__rate_interval])) / clamp_min(sum(rate(pg_stat_database_blks_hit{namespace=\"$namespace\",datname=\"$database\"}[$__rate_interval])) + sum(rate(pg_stat_database_blks_read{namespace=\"$namespace\",datname=\"$database\"}[$__rate_interval])), 1)",
              "instant": true,
              "refId": "A"
            }
          ],
          "title": "Cache Hit Ratio",
          "type": "stat"
        },
        {
          "datasource": "prometheus",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 1
                  },
                  {
                    "color": "red",
                    "value": 5
                  }
                ]
              },
              "unit": "none"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 18,
            "y": 0
          },
          "id": 4,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "textMode": "value_and_name"
          },
          "targets": [
            {
              "expr": "increase(pg_stat_database_deadlocks{namespace=\"$namespace\",datname=\"$database\"}[$__range])",
              "instant": true,
              "refId": "A"
            }
          ],
          "title": "Deadlocks (Range)",
          "type": "stat"
        },
        {
          "datasource": "prometheus",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 4
          },
          "id": 5,
          "targets": [
            {
              "expr": "sum by (kind) (label_replace(increase(pg_stat_database_xact_commit{namespace=\"$namespace\",datname=\"$database\"}[$__rate_interval]), \"kind\", \"commit\", \"__name__\", \".*\")) or sum by (kind) (label_replace(increase(pg_stat_database_xact_rollback{namespace=\"$namespace\",datname=\"$database\"}[$__rate_interval]), \"kind\", \"rollback\", \"__name__\", \".*\"))",
              "legendFormat": "{{kind}}",
              "refId": "A"
            }
          ],
          "title": "Transactions",
          "type": "timeseries"
        },
        {
          "datasource": "prometheus",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 4
          },
          "id": 6,
          "targets": [
            {
              "expr": "sum by (kind) (label_replace(increase(pg_stat_database_temp_files{namespace=\"$namespace\",datname=\"$database\"}[$__rate_interval]), \"kind\", \"temp_files\", \"__name__\", \".*\")) or sum by (kind) (label_replace(increase(pg_stat_database_temp_bytes{namespace=\"$namespace\",datname=\"$database\"}[$__rate_interval]), \"kind\", \"temp_bytes\", \"__name__\", \".*\"))",
              "legendFormat": "{{kind}}",
              "refId": "A"
            }
          ],
          "title": "Temp Files and Bytes",
          "type": "timeseries"
        },
        {
          "datasource": "prometheus",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "unit": "ms"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 9,
            "w": 8,
            "x": 0,
            "y": 12
          },
          "id": 7,
          "options": {
            "displayMode": "gradient",
            "orientation": "horizontal",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "showUnfilled": true
          },
          "targets": [
            {
              "expr": "topk(10, (sum by (queryid) (pg_stat_statements_seconds_total{namespace=\"$namespace\",service=\"postgres-exporter\",datname=\"$database\"}) / clamp_min(sum by (queryid) (pg_stat_statements_calls_total{namespace=\"$namespace\",service=\"postgres-exporter\",datname=\"$database\"}), 1)) * 1000)",
              "instant": true,
              "legendFormat": "{{queryid}}",
              "refId": "A"
            }
          ],
          "title": "Slowest Statements by Mean Time",
          "type": "bargauge"
        },
        {
          "datasource": "prometheus",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "unit": "ms"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 9,
            "w": 8,
            "x": 8,
            "y": 12
          },
          "id": 8,
          "options": {
            "displayMode": "gradient",
            "orientation": "horizontal",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "showUnfilled": true
          },
          "targets": [
            {
              "expr": "topk(10, sum by (queryid) (pg_stat_statements_seconds_total{namespace=\"$namespace\",service=\"postgres-exporter\",datname=\"$database\"}) * 1000)",
              "instant": true,
              "legendFormat": "{{queryid}}",
              "refId": "A"
            }
          ],
          "title": "Top Statements by Total Time",
          "type": "bargauge"
        },
        {
          "datasource": "prometheus",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "unit": "none"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 9,
            "w": 8,
            "x": 16,
            "y": 12
          },
          "id": 9,
          "options": {
            "displayMode": "gradient",
            "orientation": "horizontal",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "showUnfilled": true
          },
          "targets": [
            {
              "expr": "topk(10, sum by (queryid) (pg_stat_statements_calls_total{namespace=\"$namespace\",service=\"postgres-exporter\",datname=\"$database\"}))",
              "instant": true,
              "legendFormat": "{{queryid}}",
              "refId": "A"
            }
          ],
          "title": "Top Statements by Calls",
          "type": "bargauge"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": [
        "openclaw",
        "postgres",
        "observability"
      ],
      "templating": {
        "list": [
          {
            "current": {
              "selected": true,
              "text": "apps",
              "value": "apps"
            },
            "hide": 0,
            "includeAll": false,
            "label": "Namespace",
            "name": "namespace",
            "options": [
              {
                "selected": true,
                "text": "apps",
                "value": "apps"
              }
            ],
            "query": "apps",
            "skipUrlSync": false,
            "type": "constant"
          },
          {
            "current": {
              "selected": true,
              "text": "trading_openclaw",
              "value": "trading_openclaw"
            },
            "hide": 0,
            "includeAll": false,
            "label": "Database",
            "name": "database",
            "options": [
              {
                "selected": true,
                "text": "trading_openclaw",
                "value": "trading_openclaw"
              }
            ],
            "query": "trading_openclaw",
            "skipUrlSync": false,
            "type": "constant"
          }
        ]
      },
      "time": {
        "from": "now-24h",
        "to": "now"
      },
      "timezone": "browser",
      "title": "OpenClaw Postgres Overview",
      "uid": "openclaw-postgres",
      "version": 1,
      "weekStart": ""
    }
