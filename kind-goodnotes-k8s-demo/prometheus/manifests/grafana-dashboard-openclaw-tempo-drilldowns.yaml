            "content": "### Tempo Datasource\n\n- Name: `tempo`\n- Live uid: `ef78vob79qkn4b`\n- URL: `http://tempo-query-frontend.monitoring.svc.cluster.local:3200`\n\nUse Explore with Tempo to search OpenClaw spans by:\n- `service.name`\n- `provider`\n- `trade_date`\n- `job_name`\n- `agent_name`\n- `readiness_state`",
            "mode": "markdown"
