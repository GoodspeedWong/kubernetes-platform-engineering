        {
          "datasource": null,
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 4
          },
          "id": 6,
          "options": {
            "content": "### TraceQL Quick Recipes\n\n- `{ resource.service.name = \"trading-core\" }`\n- `{ resource.service.name = \"market-data-adapter\" && span.provider = \"akshare\" }`\n- `{ resource.service.name = \"agent-coordinator\" && span.agent_name = \"stock-selector-agent\" }`\n- `{ span.job_name = \"trading_day_sampling\" && span.provider = \"akshare\" }`\n- `{ span.job_name = \"trading_day_recap\" && span.provider = \"tushare_pro\" }`\n- `{ span.readiness_state = \"blocked\" }`\n\n### LLM Call Path\n\n- `{ name = \"agent.market_analyst.invoke_llm\" } >> { name = \"llm.http_request\" }`\n- `{ name = \"agent.stock_selector.invoke_llm\" } >> { name = \"llm.http_request\" }`\n- `{ name = \"llm.normalize_response\" && span.normalize_succeeded = false }`\n- `{ name = \"llm.http_request\" && span.http.status_class != \"2xx\" }`\n- `{ name = \"llm.http_request\" && span.usage.total_tokens > 500 }`\n\nRecommended attrs to inspect first:\n- `agent_name`\n- `model_name`\n- `http.status_code`\n- `usage.total_tokens`\n- `normalize_succeeded`\n\nOperational rule:\n- `blocked` / `halted` are business outcomes, not infrastructure failures.",
            "mode": "markdown"
          },
          "title": "TraceQL Recipes",
          "type": "text"
        },
        {
          "datasource": null,
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 12
          },
          "id": 8,
          "options": {
            "content": "### Sampling -> Readiness Drilldown\n\nUse these TraceQL searches in **Explore -> Tempo** when provider validation looks unstable.\n\n1. Sampling root jobs\n- `{ span.job_name = \"trading_day_sampling\" && span.provider = \"akshare\" }`\n- `{ span.job_name = \"trading_day_sampling\" && span.provider = \"tushare_pro\" }`\n\n2. Provider fetch spans\n- `{ resource.service.name = \"market-data-adapter\" && span.provider = \"akshare\" && name =~ \"provider\\\\..*\\\\.fetch_.*\" }`\n- `{ resource.service.name = \"market-data-adapter\" && span.provider = \"tushare_pro\" && name =~ \"provider\\\\..*\\\\.fetch_.*\" }`\n\n3. Readiness outcomes\n- `{ span.job_name = \"trading_day_sampling\" && span.readiness_state = \"blocked\" }`\n- `{ span.job_name = \"trading_day_sampling\" && span.readiness_state = \"validation_only\" }`\n- `{ span.job_name = \"trading_day_sampling\" && span.readiness_state = \"controlled_validation_ready\" }`\n\nInspect these attributes first:\n- `provider`\n- `trade_date`\n- `sample_mode`\n- `readiness_state`\n- `chain_status`\n- `chain_generated_intents`\n\nInterpretation rule:\n- strong sampling + weak readiness usually means the validation chain was blocked, not that OTLP/Tempo failed.",
            "mode": "markdown"
          },
          "title": "Sampling -> Readiness",
          "type": "text"
        },
        {
          "datasource": null,
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 12
          },
          "id": 9,
          "options": {
            "content": "### Reanalyze -> Agent Pipeline Drilldown\n\nUse these TraceQL searches when AI behavior looks conservative or inconsistent.\n\n1. Trading core orchestration\n- `{ resource.service.name = \"trading-core\" && name = \"trading_core.reanalyze\" }`\n- `{ resource.service.name = \"trading-core\" && name = \"trading_core.run_agent_pipeline\" }`\n\n2. Agent coordinator spans\n- `{ resource.service.name = \"agent-coordinator\" && span.agent_name = \"market-analyst-agent\" }`\n- `{ resource.service.name = \"agent-coordinator\" && span.agent_name = \"stock-selector-agent\" }`\n- `{ resource.service.name = \"agent-coordinator\" && span.agent_name = \"risk-manager-agent\" }`\n\n3. Failure-closed business outcomes\n- `{ span.recommendation_state = \"observe_only\" }`\n- `{ span.readiness_state = \"blocked\" }`\n- `{ span.halt_reason =~ \".*coverage.*\" }`\n\nInspect these attributes first:\n- `agent_name`\n- `provider`\n- `trade_date`\n- `recommendation_state`\n- `llm_confidence`\n- `fallback_used`\n- `halt_reason`\n\nInterpretation rule:\n- `blocked` / `halted` / `observe_only` are usually business guardrails, not trace pipeline failures.",
            "mode": "markdown"
          },
          "title": "Reanalyze -> Agent Pipeline",
          "type": "text"
        },
