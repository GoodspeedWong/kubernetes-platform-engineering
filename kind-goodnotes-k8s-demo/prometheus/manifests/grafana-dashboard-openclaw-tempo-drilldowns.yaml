          "options": {
            "content": "### DB Drilldown Recipes\n\nUse these TraceQL searches when business flow reaches Postgres but outcomes still look wrong.\n\n1. Reanalyze -> DB writes\n- `{ resource.service.name = \"trading-core\" && name = \"trading_core.reanalyze\" }`\n- `{ resource.service.name = \"trading-core\" && name =~ \"db\\\\..*\" && span.job_name = \"daily-analysis-and-selection\" }`\n- `{ resource.service.name = \"trading-core\" && name =~ \"db\\\\..*\" && span.db.table = \"summary_snapshots\" }`\n\n2. Sampling -> DB writes\n- `{ span.job_name = \"trading_day_sampling\" && resource.service.name = \"trading-core\" && name =~ \"db\\\\..*\" }`\n- `{ span.job_name = \"trading_day_sampling\" && name = \"db.upsert_summary\" }`\n- `{ span.job_name = \"trading_day_sampling\" && name = \"db.upsert_daily_bars\" }`\n- `{ span.job_name = \"trading_day_sampling\" && name = \"db.archive_market_data_payload\" }`\n\n3. Inspect these DB span attributes first\n- `db.operation`\n- `db.statement.name`\n- `db.table` / `db.tables`\n- `provider`\n- `trade_date`\n- `as_of_date`\n- `job_name`\n- `actor`\n\nInterpretation rule:\n- DB spans should appear as children of the existing root business trace. If they are missing entirely, suspect missing trace context or an uninstrumented repository path before blaming Tempo.",
            "mode": "markdown"
          },
          "title": "DB Writes -> Trace Drilldown",
          "type": "text"
        },
