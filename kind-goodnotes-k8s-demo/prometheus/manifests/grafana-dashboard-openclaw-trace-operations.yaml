          "options": {
            "content": "### Trace Entry Points\n\nUse **Explore -> Tempo** to search by service and attributes.\n\nCore roots:\n- `http GET/POST ...` on `trading-core`\n- `job.market_data_ingest`\n- `job.agent_pipeline`\n- `job.trading_day_sampling`\n- `job.trading_day_recap`\n- `job.portfolio_watch`\n- `job.notification_flush`\n- `job.paper_execution`\n- `job.backup_bundle`\n\nHigh-value internal spans:\n- `provider.<provider>.fetch_*`\n- `trading_core.reanalyze`\n- `trading_core.run_agent_pipeline`\n- `agent.market_analyst.invoke_llm`\n- `agent.stock_selector.invoke_llm`\n- `llm.prepare_request`\n- `llm.http_request`\n- `llm.parse_response`\n- `llm.normalize_response`\n- `watcher.run`\n- `notification.flush`\n- `notification.deliver_message`\n- `execution.paper_cycle`\n\nLLM metadata-first rule:\n- inspect `model_name`, `http.status_code`, `usage.total_tokens`, and `normalize_succeeded`\n- prompt/response bodies are intentionally excluded from spans",
            "mode": "markdown"
          },
          "title": "Trace Entry Points",
          "type": "text"
        },
        {
          "datasource": null,
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 4
          },
          "id": 8,
          "options": {
            "content": "### Query Recipes\n\nRecommended Tempo tag filters:\n- `service.name = trading-core`\n- `service.name = market-data-adapter`\n- `service.name = agent-coordinator`\n- `service.name = portfolio-watcher`\n- `service.name = notification-gateway`\n- `service.name = execution-agent`\n- `service.name = ops-stack`\n\nUseful span attributes:\n- `provider`\n- `trade_date`\n- `as_of_date`\n- `actor`\n- `job_name`\n- `agent_name`\n- `readiness_state`\n- `sample_mode`\n- `recommendation_state`\n\nOperational rule:\n- `blocked` / `halted` are expected fail-closed business outcomes.\n- Treat only real exceptions / exporter failures as system errors.",
            "mode": "markdown"
          },
          "title": "Tempo Search Contract",
